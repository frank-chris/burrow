version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: .
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
      - goos: linux
        formats: [tar.gz]
      - goos: darwin
        formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

brews:
  - name: burrow
    repository:
      owner: frank-chris
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/frank-chris/burrow"
    description: "Dev tunnel CLI wrapping Cloudflare Tunnel with team-friendly persistent URLs"
    license: MIT
    install: |
      bin.install "burrow"
    test: |
      system "#{bin}/burrow", "--version"

scoops:
  - repository:
      owner: frank-chris
      name: scoop-burrow
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/frank-chris/burrow"
    description: "Dev tunnel CLI wrapping Cloudflare Tunnel with team-friendly persistent URLs"
    license: MIT

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - "^refactor:"
      - Merge pull request
      - Merge branch
